# pyproject.toml — atlassian-remote (UC3 heavy-compute backend)
# Forge Remote backend: text embedding, xqdrant vector search, and CF Workers AI
# RCA generation. Called only by atlassian-agent (Forge) over authenticated HTTP.
# All LLM calls go through Cloudflare Workers AI; shared schemas come from trace-core.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "atlassian-remote"
version = "0.1.0"
description = "Sentinel UC3: Forge Remote backend — embeddings, xqdrant search, RCA drafting."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Team Selecao" }]

dependencies = [
    "trace-core",            # RcaDraft, SearchResult, Attribution, thresholds (workspace)
    "flight-recorder",       # UC2: tape RCA-gen LLM calls into a cassette + manifest (workspace)
    "pydantic>=2.0",         # request/response + RCA structured output
    "httpx>=0.27",           # CF Workers AI + Atlassian REST + eval-engine calls
    "qdrant-client>=1.9",    # xqdrant similarity search (localhost:6333, internal only)
    "fastapi>=0.110",        # the /analyze /search /embed API on port 8080
    "uvicorn>=0.29",         # ASGI server for api.py
    "langfuse>=4.9.1",
]

# Standard src-layout: importable package at src/atlassian_remote/, imported as
# `from atlassian_remote.vector_search import ...`. Hatchling maps
# src/atlassian_remote -> atlassian_remote in the wheel (and editable installs).
[tool.hatch.build.targets.wheel]
packages = ["src/atlassian_remote"]
