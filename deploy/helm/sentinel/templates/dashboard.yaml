{{- if .Values.dashboard.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    app: dashboard
    {{- include "sentinel.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels: { app: dashboard }
  template:
    metadata:
      labels: { app: dashboard }
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.image.dashboard.repository }}:{{ .Values.image.dashboard.tag }}"
          imagePullPolicy: {{ .Values.image.dashboard.pullPolicy }}
          ports:
            - containerPort: {{ .Values.dashboard.port }}
          env:
            - name: EVAL_ENGINE_INTERNAL_URL
              valueFrom:
                configMapKeyRef: { name: sentinel-config, key: EVAL_ENGINE_INTERNAL_URL }
            - name: FLIGHT_RECORDER_INTERNAL_URL
              valueFrom:
                configMapKeyRef: { name: sentinel-config, key: FLIGHT_RECORDER_INTERNAL_URL }
          readinessProbe:
            httpGet: { path: /, port: {{ .Values.dashboard.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    app: dashboard
    {{- include "sentinel.labels" . | nindent 4 }}
spec:
  selector: { app: dashboard }
  ports:
    - name: http
      port: {{ .Values.dashboard.port }}
      targetPort: {{ .Values.dashboard.port }}
{{- end }}
