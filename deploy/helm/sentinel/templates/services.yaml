{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $name }}
    {{- include "sentinel.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels: { app: {{ $name }} }
  template:
    metadata:
      labels: { app: {{ $name }} }
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.image.python.repository }}:{{ $.Values.image.python.tag }}"
          imagePullPolicy: {{ $.Values.image.python.pullPolicy }}
          command: ["uvicorn", "api:app", "--app-dir", "{{ $svc.appDir }}", "--host", "0.0.0.0", "--port", "{{ $svc.port }}"]
          ports:
            - containerPort: {{ $svc.port }}
          envFrom:
            - configMapRef: { name: sentinel-config }
            - secretRef: { name: sentinel-secrets }
          readinessProbe:
            httpGet: { path: /health, port: {{ $svc.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: {{ $svc.port }} }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $name }}
    {{- include "sentinel.labels" $ | nindent 4 }}
spec:
  selector: { app: {{ $name }} }
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
{{- end }}
