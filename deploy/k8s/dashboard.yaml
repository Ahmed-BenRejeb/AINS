# Dashboard (Next.js) — the human-facing UI. Server-side fetches the eval-engine
# and flight-recorder via the in-cluster internal URLs (from the ConfigMap).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: sentinel
  labels: { app: dashboard }
spec:
  replicas: 1
  selector:
    matchLabels: { app: dashboard }
  template:
    metadata:
      labels: { app: dashboard }
    spec:
      containers:
        - name: dashboard
          image: sentinel-dashboard:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: EVAL_ENGINE_INTERNAL_URL
              valueFrom:
                configMapKeyRef: { name: sentinel-config, key: EVAL_ENGINE_INTERNAL_URL }
            - name: FLIGHT_RECORDER_INTERNAL_URL
              valueFrom:
                configMapKeyRef: { name: sentinel-config, key: FLIGHT_RECORDER_INTERNAL_URL }
          readinessProbe:
            httpGet: { path: /, port: 3001 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: sentinel
  labels: { app: dashboard }
spec:
  selector: { app: dashboard }
  ports:
    - name: http
      port: 3001
      targetPort: 3001
