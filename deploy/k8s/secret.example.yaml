# Template for the Sentinel secrets (tokens / keys / passwords).
# Copy to secret.yaml and fill in (or run deploy/k8s/gen-config.sh to generate it
# from the repo .env). secret.yaml is gitignored — only this template is committed.
#
# NOTE: stringData takes plain text; Kubernetes base64-encodes it for you.
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-secrets
  namespace: sentinel
type: Opaque
stringData:
  # ── Cloudflare ──
  CLOUDFLARE_ACCOUNT_ID: "REPLACE_ME"
  CLOUDFLARE_API_TOKEN: "REPLACE_ME"
  CF_AI_ACCOUNT_ID: ""          # optional: separate Workers AI account
  CF_AI_API_TOKEN: ""           # optional
  CF_D1_DATABASE_ID: "REPLACE_ME"

  # ── Blob storage (MinIO) — also the MinIO root password ──
  BLOB_STORAGE_SECRET_KEY: "REPLACE_ME_min_8_chars"

  # ── Atlassian ──
  ATLASSIAN_API_TOKEN: "REPLACE_ME"

  # ── Langfuse ──
  LANGFUSE_PUBLIC_KEY: "pk-lf-REPLACE_ME"
  LANGFUSE_SECRET_KEY: "sk-lf-REPLACE_ME"

  # ── Audit + Forge shared secret ──
  AUDIT_HMAC_KEY: "REPLACE_ME_random_32_chars"
  FORGE_REMOTE_SECRET: "REPLACE_ME_random_32_chars"
